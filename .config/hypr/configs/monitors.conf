# monitor configuration

# monitor=HDMI-A-5,   1920x1080@60.00, 0x1080,	1
# monitor=DP-5,		1920x1080@60.00, 1920x1080,	1

monitor=DP-5,   1920x1080@60.00, 0x1080,	1
monitor=HDMI-A-5,		1920x1080@60.00, 1920x1080,	1
# monitor=DP-2,		1920x1080@60.00, auto,	1, mirror, HDMI-A-5
monitor=DP-2,		1920x1080@60.00, 1, mirror, HDMI-A-5

# monitor=HDMI-A-1,   1920x1080@60.00, 1920x1080,	1
# monitor=DP-3,		1920x1080@60.00, 0x1080,	1
# monitor=DP-2,		1920x1080@60.00,mirror,  DP-3,	1
# monitor=DP-2,preferred,auto,1,mirror,DP-3

# use this for auto
# monitor=,preferred,auto,1

# space for bar
monitor=,addreserved,0,0,0,0

# # bind workspaces to monitor
# workspace = monitor:DP-5, 1
# workspace = monitor:DP-5, 2
# workspace = monitor:DP-5, 3
# workspace = monitor:DP-5, 4
# workspace = monitor:DP-5, 5
# workspace = monitor:DP-5, 6
# 
# # bind workspaces to monitor
# workspace = monitor:HDMI-A-5, 7
# workspace = monitor:HDMI-A-5, 8
# workspace = monitor:HDMI-A-5, 9

# bind workspaces to monitor
workspace = monitor:HDMI-A-5, 1
workspace = monitor:HDMI-A-5, 2
workspace = monitor:HDMI-A-5, 3
workspace = monitor:HDMI-A-5, 4
workspace = monitor:HDMI-A-5, 5
workspace = monitor:HDMI-A-5, 6

# bind workspaces to monitor
workspace = monitor:DP-5, 7
workspace = monitor:DP-5, 8
workspace = monitor:DP-5, 9
