exec-once = git --git-dir=$HOME/.dotfiles/ --work-tree=$HOME commit -am "$(date '+%D %I:%M') autopush"

# Swww images
# exec-once   =   swww img /home/sweet/Pictures/backgrounds/silvervale.gif
