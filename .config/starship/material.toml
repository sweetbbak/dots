# Don't print a new line at the start of the prompt
add_newline = false
# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—

right_format = """\
$cmd_duration
"""

format = """
$username$directory
$character
"""

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[рҹӯ§рҹӯ’](bold fg:blue)[ вһң ](bold bg:blue fg:#000000)[оӮ°](bold fg:blue)"

error_symbol = "[рҹӯ§рҹӯ’](bold fg:red)[ вң— ](bold bg:red fg:#000000)[оӮ°](bold fg:red)"
# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
symbol = "рҹҢұ "
truncation_length = 4
truncation_symbol = ""

[git_commit]
commit_hash_length = 4
tag_symbol = "рҹ”– "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](blue)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[оӮј ](bold bg:cyan fg:cyan)[$hostname](bg:cyan bold fg:#000000)[оӮј ](bold fg:cyan bg:green)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed blue"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:blue fg:#000000"
style_root = "red bold"
format = "[рҹӯғ](bold fg:blue)[$user]($style)"
disabled = false
show_always = true

[directory]
# home_symbol = "пҖ• "
read_only = " пҖЈ "
style = "bold bg:blue fg:#000000"
truncation_length = 2
truncation_symbol = "./"
format = '[ $path]($style)[рҹӯһ](fg:red)'


# [directory.substitutions]
# "Documents" = "вң§ "
# "/" = " вҰҷ "
# "Downloads" = "пҖҷ "
# "Music" = "пҖҒ "
# "Pictures" = "пҖҫ "

[cmd_duration]
min_time = 0
# format = '[рҹ¬Ҳрҹ¬–рҹ¬Ҙрҹ¬… ](bold bg:yellow fg:#000000)[time:$duration](bold bg:yellow fg:#000000)[ рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—](bold bg:yellow fg:#000000)'
format = '[оғҠ](bold fg:red)[time:$duration ](bold bg:red fg:#000000)[оғҲ](bold fg:red)'
